apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: odh-tec
  namespace: redhat-ods-applications
  labels:
    # app.kubernetes.io/created-by: ''
    app.kubernetes.io/part-of: workbenches
    app.opendatahub.io/workbenches: 'true'
    component.opendatahub.io/name: notebooks
    opendatahub.io/component: 'true'
    opendatahub.io/dashboard: 'true'
    opendatahub.io/notebook-image: 'true'
  annotations:
    # opendatahub.io/notebook-image-order: '12'
    opendatahub.io/notebook-image-url: >-
      quay.io/rh-aiservices-bu/odh-tec:latest
    opendatahub.io/notebook-image-name: >-
      ODH-TEC
    opendatahub.io/notebook-image-desc: |-
      Open Data Hub Tools & Extensions Companion (ODH-TEC) application
      implements a unified storage management platform and tools that
      can be useful to anyone working with Open Data Hub (ODH), Red Hat
      OpenShift AI (RHOAI), or even locally with Podman. It supports
      both S3-compatible object storage and local filesystem storage
      (PVC mounts), providing seamless file management across different
      storage types.
spec:
  lookupPolicy:
    local: true
  tags:
    - name: 2.1.1
      annotations:
        # opendatahub.io/notebook-build-commit: 'xyz'
        opendatahub.io/notebook-python-dependencies: '[]'
        opendatahub.io/notebook-software: '[{"name":"ODH-TEC","version":"2.1.1","visible":true}]'
        opendatahub.io/workbench-image-recommended: 'false'
        openshift.io/imported-from: 'quay.io/rh-aiservices-bu/odh-tec:2.1.1'
      from:
        kind: DockerImage
        name: 'quay.io/rh-aiservices-bu/odh-tec:2.1.1'
      importPolicy:
        scheduled: true
      referencePolicy:
        type: Source
